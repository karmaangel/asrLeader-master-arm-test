name: Build Ascend NPU Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version suffix, for example 20260602"
        required: true
        default: "20260602"
      runner:
        description: "Runner label. Use an ARM64 runner for native linux/arm64 builds."
        required: true
        default: "ubuntu-24.04-arm"
      publish_ghcr:
        description: "Push image to GitHub Container Registry"
        required: true
        type: boolean
        default: false
      publish_release:
        description: "Publish split offline package to a GitHub Release"
        required: true
        type: boolean
        default: true
      include_models:
        description: "Include deploy/ascend-npu/models in the offline package"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 360
    env:
      VERSION: ${{ inputs.version }}
      LOCAL_IMAGE: funasr-leader-asr:npu-ascend-${{ inputs.version }}
      IMAGE_TAR: funasr-leader-asr-npu-ascend-${{ inputs.version }}.tar
      PACKAGE_TAR: asr-leader-ascend-npu-offline-${{ inputs.version }}.tar

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: ${{ inputs.include_models }}

      - name: Initialize build metadata
        shell: bash
        run: |
          set -euo pipefail
          ghcr_image="ghcr.io/${GITHUB_REPOSITORY,,}:npu-ascend-${VERSION}"
          echo "GHCR_IMAGE=${ghcr_image}" >> "${GITHUB_ENV}"
          echo "Version: ${VERSION}"
          echo "Local image: ${LOCAL_IMAGE}"
          echo "GHCR image: ${ghcr_image}"
          uname -a
          docker version
          docker info
          df -h

      - name: Build Ascend NPU image
        shell: bash
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          set -euo pipefail
          docker build \
            --pull \
            --platform linux/arm64 \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            -f docker/Dockerfile.npu \
            -t "${LOCAL_IMAGE}" \
            .
          docker image inspect "${LOCAL_IMAGE}" --format '{{.Id}} {{.Architecture}} {{.Os}}'
          df -h

      - name: Push image to GHCR
        if: ${{ inputs.publish_ghcr }}
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          docker tag "${LOCAL_IMAGE}" "${GHCR_IMAGE}"
          docker push "${GHCR_IMAGE}"

      - name: Create split offline package
        if: ${{ inputs.publish_release }}
        shell: bash
        run: |
          set -euo pipefail

          dist_dir="${PWD}/dist"
          pkg_root="${PWD}/package-root"
          rm -rf "${dist_dir}" "${pkg_root}"
          mkdir -p "${dist_dir}" "${pkg_root}/ascend-npu/image"

          excludes=(--exclude image --exclude data)
          if [[ "${{ inputs.include_models }}" != "true" ]]; then
            excludes+=(--exclude models)
          fi

          rsync -a "${excludes[@]}" deploy/ascend-npu/ "${pkg_root}/ascend-npu/"

          if [[ "${{ inputs.include_models }}" != "true" ]]; then
            mkdir -p "${pkg_root}/ascend-npu/models"
            cat > "${pkg_root}/ascend-npu/MODELS_REQUIRED.txt" <<'EOF'
          This offline package does not include model weights.

          Before running start.sh on the Ascend server, copy the model directories here:

            ascend-npu/models/paraformer-zh
            ascend-npu/models/fsmn-vad
            ascend-npu/models/ct-punc
            ascend-npu/models/cam++
            ascend-npu/models/Qwen2.5-1.5B-Instruct

          The docker-compose.yml file mounts ./models to /models inside the container.
          EOF
          fi

          docker save -o "${pkg_root}/ascend-npu/image/${IMAGE_TAR}" "${LOCAL_IMAGE}"

          find "${pkg_root}/ascend-npu" -type f \( -name "*.sh" -o -name "*.yml" -o -name "*.md" -o -name "*.txt" \) -print0 \
            | xargs -0 sed -i \
                -e "s#funasr-leader-asr:npu-ascend-[0-9][0-9]*#${LOCAL_IMAGE}#g" \
                -e "s#funasr-leader-asr-npu-ascend-[0-9][0-9]*\.tar#${IMAGE_TAR}#g" \
                -e "s#asr-leader-ascend-npu-offline-[0-9][0-9]*\.tar#${PACKAGE_TAR}#g"

          (
            cd "${pkg_root}/ascend-npu"
            sha256sum "image/${IMAGE_TAR}" > SHA256SUMS.txt
          )

          du -sh "${pkg_root}/ascend-npu"

          tar -C "${pkg_root}" -cf - ascend-npu \
            | tee >(sha256sum | awk -v file="${PACKAGE_TAR}" '{print $1 "  " file}' > "${dist_dir}/${PACKAGE_TAR}.sha256") \
            | split -b 1900m -d -a 3 - "${dist_dir}/${PACKAGE_TAR}.part-"

          ls -lh "${dist_dir}"

      - name: Publish offline package release
        if: ${{ inputs.publish_release }}
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag="ascend-npu-${VERSION}"
          notes_file="dist/release-notes.md"
          cat > "${notes_file}" <<EOF
          Ascend NPU offline package ${VERSION}

          Image tag inside package:

            ${LOCAL_IMAGE}

          GHCR image, if publish_ghcr was enabled:

            ${GHCR_IMAGE}

          Rebuild the offline tar on Linux:

            cat ${PACKAGE_TAR}.part-* > ${PACKAGE_TAR}
            sha256sum -c ${PACKAGE_TAR}.sha256
            tar -xf ${PACKAGE_TAR}
            cd ascend-npu
            chmod +x *.sh
            ./start.sh

          If this package was built with include_models=false, copy the required model directories into ascend-npu/models before running start.sh.
          EOF

          assets=(dist/${PACKAGE_TAR}.part-* "dist/${PACKAGE_TAR}.sha256")
          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" "${assets[@]}" --clobber
          else
            gh release create "${tag}" "${assets[@]}" \
              --target "${GITHUB_SHA}" \
              --title "Ascend NPU offline package ${VERSION}" \
              --notes-file "${notes_file}"
          fi

          gh release view "${tag}" --json url --jq .url
