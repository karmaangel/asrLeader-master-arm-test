name: Build Ascend NPU Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version suffix, for example 20260602"
        required: true
        default: "20260602"
      runner:
        description: "Runner label. Use an ARM64 runner for native linux/arm64 builds."
        required: true
        default: "ubuntu-22.04-arm"
      publish_ghcr:
        description: "Push image to GitHub Container Registry"
        required: true
        type: boolean
        default: true
      publish_release:
        description: "Publish split offline package to a GitHub Release"
        required: true
        type: boolean
        default: true
      include_models:
        description: "Include deploy/ascend-npu/models in the offline package"
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 360
    env:
      VERSION: ${{ inputs.version }}
      LOCAL_IMAGE: funasr-leader-asr:npu-ascend-${{ inputs.version }}
      IMAGE_TAR: funasr-leader-asr-npu-ascend-${{ inputs.version }}.tar
      PACKAGE_TAR: asr-leader-ascend-npu-offline-${{ inputs.version }}.tar

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          lfs: ${{ inputs.include_models }}

      - name: Initialize build metadata
        shell: bash
        run: |
          set -euo pipefail
          ghcr_image="ghcr.io/${GITHUB_REPOSITORY,,}:npu-ascend-${VERSION}"
          echo "GHCR_IMAGE=${ghcr_image}" >> "${GITHUB_ENV}"
          echo "Version: ${VERSION}"
          echo "Local image: ${LOCAL_IMAGE}"
          echo "GHCR image: ${ghcr_image}"
          uname -a
          docker version
          docker info
          df -h

      - name: Build Ascend NPU image
        shell: bash
        env:
          DOCKER_BUILDKIT: "1"
        run: |
          set -euo pipefail
          docker build \
            --pull \
            --platform linux/arm64 \
            --label "org.opencontainers.image.source=https://github.com/${GITHUB_REPOSITORY}" \
            -f docker/Dockerfile.npu \
            -t "${LOCAL_IMAGE}" \
            .
          docker image inspect "${LOCAL_IMAGE}" --format '{{.Id}} {{.Architecture}} {{.Os}}'
          df -h

      - name: Push image to GHCR
        if: ${{ inputs.publish_ghcr }}
        shell: bash
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          echo "${GHCR_TOKEN}" | docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
          docker tag "${LOCAL_IMAGE}" "${GHCR_IMAGE}"
          docker push "${GHCR_IMAGE}"

      - name: Create split offline package
        if: ${{ inputs.publish_release }}
        shell: bash
        run: |
          set -euo pipefail

          dist_dir="${PWD}/dist"
          pkg_root="${PWD}/package-root"
          rm -rf "${dist_dir}" "${pkg_root}"
          mkdir -p "${dist_dir}" "${pkg_root}/ascend-npu/image"