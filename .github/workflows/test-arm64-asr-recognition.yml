name: Test ARM64 ASR Recognition

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version suffix, for example 20260608"
        required: true
        default: "20260608"
      runner:
        description: "ARM64 runner label"
        required: true
        default: "ubuntu-24.04-arm"
      startup_timeout_seconds:
        description: "How long to wait for model download/load and API startup"
        required: true
        default: "7200"

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 180
    env:
      VERSION: ${{ inputs.version }}
      LOCAL_IMAGE: funasr-leader-asr:cpu-arm64-${{ inputs.version }}
      PACKAGE_TAR: asr-leader-cpu-arm64-offline-${{ inputs.version }}.tar

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Show runner details
        shell: bash
        run: |
          set -euo pipefail
          uname -a
          docker version
          docker info
          df -h

      - name: Download ARM64 release package
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "cpu-arm64-${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "${PACKAGE_TAR}.part-*" \
            --pattern "${PACKAGE_TAR}.sha256" \
            --dir dist
          ls -lh dist

      - name: Rebuild tar and load image
        shell: bash
        run: |
          set -euo pipefail
          cat "dist/${PACKAGE_TAR}.part-"* > "dist/${PACKAGE_TAR}"
          (
            cd dist
            sha256sum -c "${PACKAGE_TAR}.sha256"
          )

          mkdir -p package-root
          tar -xf "dist/${PACKAGE_TAR}" -C package-root

          (
            cd package-root/asr-leader-cpu-arm64
            sha256sum -c SHA256SUMS.txt
            ./load_image.sh
          )

          docker image inspect "${LOCAL_IMAGE}" --format '{{.Id}} {{.Architecture}} {{.Os}}'
          test "$(docker image inspect "${LOCAL_IMAGE}" --format '{{.Architecture}}')" = "arm64"

      - name: Prepare runtime directories
        shell: bash
        run: |
          mkdir -p results runtime/data runtime/models runtime/modelscope-cache

      - name: Restore ModelScope cache
        uses: actions/cache/restore@v4
        with:
          path: runtime/modelscope-cache
          key: modelscope-arm64-asr-${{ inputs.version }}-${{ github.run_id }}
          restore-keys: |
            modelscope-arm64-asr-${{ inputs.version }}-

      - name: Start ARM64 API container
        shell: bash
        run: |
          set -euo pipefail

          docker run -d \
            --name asr-arm-test \
            --platform linux/arm64 \
            --shm-size 2g \
            -p 8000:8000 \
            -e ASR_DEVICE=cpu \
            -e MODELS_DIR=/models \
            -e DATA_DIR=/data \
            -e POSTPROCESS_ENABLED=false \
            -e POSTPROCESS_PRELOAD=false \
            -e MODELSCOPE_CACHE=/root/.cache/modelscope \
            -v "${PWD}/runtime/data:/data" \
            -v "${PWD}/runtime/models:/models:ro" \
            -v "${PWD}/runtime/modelscope-cache:/root/.cache/modelscope" \
            "${LOCAL_IMAGE}"

          docker ps --filter "name=asr-arm-test"

      - name: Wait for API health
        shell: bash
        run: |
          set -euo pipefail
          timeout_seconds="${{ inputs.startup_timeout_seconds }}"
          deadline=$((SECONDS + timeout_seconds))
          until curl -fsS http://127.0.0.1:8000/health > results/health.json; do
            if ! docker ps --format '{{.Names}}' | grep -qx 'asr-arm-test'; then
              echo "Container exited before health check passed" >&2
              docker logs asr-arm-test >&2 || true
              exit 1
            fi
            if [ "${SECONDS}" -ge "${deadline}" ]; then
              echo "Timed out waiting for API health after ${timeout_seconds}s" >&2
              docker logs --tail=300 asr-arm-test >&2 || true
              exit 1
            fi
            echo "Waiting for model download/load and API startup..."
            sleep 15
          done

          cat results/health.json

      - name: Run transcription request
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS -X POST http://127.0.0.1:8000/transcribe \
            -F "file=@tests/fixtures/asr_example.wav" \
            -F "identify_leaders=false" \
            -F "post_process=false" \
            -F "correction_mode=none" \
            | tee results/transcribe.json

      - name: Validate transcription result
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          from pathlib import Path

          result = json.loads(Path("results/transcribe.json").read_text(encoding="utf-8"))
          assert result.get("code") == 200, result
          segments = result.get("data")
          assert isinstance(segments, list), result
          text = "".join(str(segment.get("text", "")) for segment in segments)
          print("segments:", len(segments))
          print("recognized_text:", text)
          assert text.strip(), result
          Path("results/recognized.txt").write_text(text, encoding="utf-8")
          PY

      - name: Collect container logs
        if: always()
        shell: bash
        run: |
          mkdir -p results
          docker logs asr-arm-test > results/container.log 2>&1 || true
          docker inspect asr-arm-test > results/container.inspect.json 2>/dev/null || true
          docker ps -a > results/docker-ps.txt || true
          du -sh runtime/modelscope-cache > results/modelscope-cache-size.txt 2>&1 || true

      - name: Stop container
        if: always()
        shell: bash
        run: |
          docker rm -f asr-arm-test >/dev/null 2>&1 || true

      - name: Save ModelScope cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: runtime/modelscope-cache
          key: modelscope-arm64-asr-${{ inputs.version }}-${{ github.run_id }}

      - name: Upload recognition results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: arm64-asr-recognition-${{ inputs.version }}
          path: |
            results/**
          if-no-files-found: warn
